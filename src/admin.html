<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.11.0/axios.min.js"></script>
  <title>PhoneStore - Admin</title>
  <!-- link logo website -->
  <link rel="icon" href="./images/logoweb.png">
  <!-- link output.css -->
  <link rel="stylesheet" href="./output.css">
  <!-- link gg-fonts -->
  <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
  <!-- link cdn font-awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="bg-slate-50 min-h-screen font-sans">
  <!-- header -->
  <header class="bg-white border-b border-slate-300 p-4 sticky top-0 z-10 shadow-sm">
    <div class="max-w-7xl mx-auto flex justify-between items-center px-4">
      <a href="./admin.html" class="flex items-center gap-3">
          <img src="./images/logoweb.png" class="w-15" alt="">
          <div>
            <h1 class="hidden sm:block text-xl md:text-2xl font-black tracking-tight">
              KienPhone
            </h1>
            <p class="text-[11px] hidden sm:block text-slate-400 font-bold -mt-1">
              Premium Mobile Store
            </p>
          </div>
        </a>
      <button id="btnlogout" class="text-sm md:text-lg bg-indigo-600 py-2 px-3 rounded-lg text-white font-medium hover:opacity-100 opacity-85 duration-200 cursor-pointer">Đăng xuất</button>
    </div>
  </header>
  <!-- main -->
  <main class="max-w-7xl mx-auto p-4 lg:p-6 grid grid-cols-1 lg:grid-cols-12 gap-8">
    <!-- Form Section -->
    <section class="lg:col-span-4">
      <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 sticky top-24">
        <h2 class="text-lg font-bold mb-6">Thông tin sản phẩm</h2>
        <form id="productForm" class="space-y-4">
          <div>
            <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Tên máy</label>
            <input id="name" type="text" class="w-full border rounded-xl px-4 py-2.5 outline-none focus:border-indigo-500 bg-slate-50" placeholder="Tên điện thoại">
            <p id="error-name" class="error-msg text-red-500 text-sm mt-1"></p>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Giá bán</label>
              <input id="price" type="number" class="w-full border rounded-xl px-4 py-2.5 outline-none bg-slate-50" placeholder="Giá">
              <p id="error-price" class="error-msg text-red-500 text-sm mt-1"></p>
            </div>
            <div>
              <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Hãng</label>
              <select id="type" class="w-full border rounded-xl px-4 py-2.5 outline-none bg-slate-50 cursor-pointer">
                <option value="">Chọn loại</option>
                <option value="iPhone">Apple (iPhone)</option>
                <option value="Samsung">Samsung Galaxy</option>
                <option value="OPPO">OPPO</option>
                <option value="Vivo">Vivo</option>
                <option value="Realme">Realme</option>
                <option value="Asus">Asus (ROG Phone)</option>
                <option value="Nokia">Nokia</option>
              </select>
              <p id="error-type" class="error-msg text-red-500 text-sm mt-1"></p>
            </div>
          </div>
          <div class="w-full">
            <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Link ảnh</label>
            <input id="img" type="text" class="w-full border rounded-xl px-4 py-2.5 outline-none bg-slate-50" placeholder="Link ảnh điện thoại">
            <p id="error-img" class="error-msg text-red-500 text-sm mt-1"></p>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Màn hình</label>
              <input id="screen" type="text" placeholder="Màn hình" class="w-full border rounded-xl px-4 py-2 outline-none bg-slate-50">
            </div>
            <div>
              <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Mô tả</label>
              <input id="desc" type="text" placeholder="Mô tả" class="w-full border rounded-xl px-4 py-2 outline-none bg-slate-50">
            </div>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Cam sau</label>
              <input id="backCamera" type="text" placeholder="Cam sau" class="w-full border rounded-xl px-4 py-2 outline-none bg-slate-50">
            </div>
            <div>
              <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Cam trước</label>
              <input id="frontCamera" type="text" placeholder="Cam trước" class="w-full border rounded-xl px-4 py-2 outline-none bg-slate-50">
            </div>
          </div>
          <div class="flex gap-2 pt-4">
            <button type="submit" id="btnSave" class="flex-1 bg-indigo-600 duration-200 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 cursor-pointer">Tạo mới</button>
            <button type="button" id="btnUpdate" class="flex-1 bg-amber-500 hover:opacity-85 duration-100 text-white font-bold py-3 rounded-xl hidden cursor-pointer">Cập nhật</button>
            <button type="button" id="btnReset" class="px-5 bg-slate-200 hover:bg-slate-300 duration-200 text-slate-600 font-bold rounded-xl py-3 cursor-pointer">Reset</button>
          </div>
        </form>
      </div>
    </section>

    <!-- Table Section -->
    <section class="lg:col-span-8">
      <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="p-4 border-b flex flex-col sm:flex-row justify-between items-center gap-4 bg-slate-50/50">
          <h2 class="font-bold">Danh sách sản phẩm</h2>
          <div class="flex gap-2 bg-white p-1 rounded-xl border border-slate-200 w-full sm:w-auto">
            <input id="keyword" type="text" placeholder="Tìm kiếm..." class="px-3 py-1 text-sm outline-none w-full sm:w-52">
            <button id="btnSearch" class="bg-slate-500 hover:bg-slate-700 duration-200 text-white px-4 py-1.5 rounded-lg text-sm font-bold cursor-pointer">Tìm</button>
          </div>
        </div>
        <!-- Cuộn bảng -->
        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse min-w-[600px]">
            <thead>
              <tr class="text-slate-400 text-[11px] uppercase tracking-widest font-bold border-b">
                <th class="py-4 px-6">ID</th>
                <th class="py-4 px-6">Sản phẩm</th>
                <th class="py-4 px-6 text-center">Giá</th>
                <th class="py-4 px-6">Loại</th>
                <th class="py-4 px-6 text-center">Thao tác</th>
              </tr>
            </thead>
            <tbody id="productTableBody"></tbody>
          </table>
        </div>
        
        <div id="pagination" class="p-6 border-t flex justify-center gap-2"></div>
      </div>
    </section>
  </main>
  <script type="module" src="./js/admin.js"></script>
    <script>window.location.href = "./page-admin/dashboard.html";</script>
</body>
</html>
